<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>白板筆記 · 進階版</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --bg:#f4f5f7; --grid:#e2e5ea; --ink:#2b2f36; --muted:#8a909a;
    --panel:#ffffff; --line:#b9c0cb; --accent:#4c8bf5; --shadow:0 2px 10px rgba(20,30,50,.12);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;overflow:hidden;font-family:-apple-system,"PingFang TC","Microsoft JhengHei",Segoe UI,Roboto,sans-serif;color:var(--ink);background:var(--bg);}
  #stage{position:fixed;inset:0;overflow:hidden;touch-action:none;cursor:grab;
    background-image:linear-gradient(var(--grid) 1px,transparent 1px),linear-gradient(90deg,var(--grid) 1px,transparent 1px);}
  #stage.panning{cursor:grabbing;}
  #world{position:absolute;left:0;top:0;transform-origin:0 0;}
  svg#wires{position:absolute;left:0;top:0;overflow:visible;pointer-events:none;}
  svg#wires path{fill:none;stroke:var(--line);stroke-width:2.5;}
  svg#wires text.wlabel{fill:var(--ink);font-size:12px;font-family:inherit;paint-order:stroke;stroke:var(--panel);stroke-width:4px;stroke-linejoin:round;cursor:pointer;}
  .card{position:absolute;min-width:180px;max-width:520px;background:var(--panel);border-radius:12px;box-shadow:var(--shadow);border:1px solid #e6e9ef;display:flex;flex-direction:column;overflow:hidden;}
  .card.sel{outline:2px solid var(--accent);outline-offset:1px;}
  .card .bar{height:24px;display:flex;align-items:center;gap:6px;padding:0 6px 0 10px;cursor:move;background:var(--c,#fafbfc);border-bottom:1px solid #eef0f4;}
  .card .bar .sp{flex:1;}
  .card .open{font-size:12px;border:0;background:rgba(76,139,245,.12);color:var(--accent);border-radius:6px;padding:2px 7px;cursor:pointer;opacity:0;transition:.1s;}
  .card:hover .open{opacity:1;}
  .card .open.has{opacity:1;background:var(--accent);color:#fff;}
  .card .open.kan{opacity:1;background:#0c8599;color:#fff;}
  .card .title{font-weight:600;font-size:14px;padding:8px 12px 2px;outline:none;min-height:20px;}
  .card .title:empty:before{content:"標題";color:var(--muted);}
  .card .body{font-size:13px;line-height:1.55;padding:2px 12px 12px;outline:none;white-space:pre-wrap;color:#3c424c;min-height:22px;}
  .card .body:empty:before{content:"輸入內容…";color:var(--muted);}
  .card .port{position:absolute;width:14px;height:14px;border-radius:50%;background:#fff;border:2px solid var(--accent);right:-8px;top:calc(50% - 7px);cursor:crosshair;opacity:0;transition:.1s;}
  .card:hover .port{opacity:1;}
  .card .port.l{left:-8px;right:auto;}
  .card.dim,.kcard.dim{opacity:.25;}

  /* ===== kanban ===== */
  #kanban{position:fixed;left:0;right:0;top:58px;bottom:0;display:none;gap:12px;padding:14px;overflow-x:auto;overflow-y:hidden;align-items:flex-start;}
  #kanban.show{display:flex;}
  .col{background:#ebecf0;border-radius:12px;width:280px;flex:0 0 280px;max-height:100%;display:flex;flex-direction:column;}
  .col-h{padding:8px 8px 6px;display:flex;align-items:center;gap:4px;}
  .col-h .ctitle{flex:1;font-weight:700;font-size:14px;outline:none;padding:2px 4px;border-radius:5px;}
  .col-h .ctitle:focus{background:#fff;}
  .col-h button{border:0;background:transparent;cursor:pointer;color:#6b7280;border-radius:5px;font-size:13px;padding:2px 5px;}
  .col-h button:hover{background:#dfe1e6;}
  .col-cards{padding:0 8px 6px;overflow-y:auto;display:flex;flex-direction:column;gap:8px;min-height:8px;}
  .kcard{background:var(--kc,#fff);border-radius:8px;padding:7px 8px 8px;box-shadow:0 1px 1px rgba(9,30,66,.25);display:flex;gap:6px;align-items:flex-start;}
  .kcard .kh{cursor:grab;color:#9aa3b0;font-size:16px;line-height:1.1;user-select:none;touch-action:none;padding:0 4px 2px 0;align-self:stretch;}
  .kcard .kbody{flex:1;min-width:0;}
  .kcard .ktitle{font-size:13.5px;line-height:1.45;outline:none;word-break:break-word;}
  .kcard .ktitle:empty:before{content:"輸入…";color:var(--muted);}
  .kcard .kmore{border:0;background:transparent;color:#aab2bd;cursor:pointer;font-size:13px;border-radius:4px;padding:0 3px;opacity:0;}
  .kcard:hover .kmore{opacity:1;}
  .kcard.dragging{position:fixed;z-index:999;width:264px;pointer-events:none;box-shadow:0 8px 20px rgba(9,30,66,.35);transform:rotate(2deg);}
  .kph{background:#cfd4dc;border-radius:8px;}
  .add-card{margin:2px 8px 8px;border:0;background:transparent;color:#5e6c84;text-align:left;padding:6px 6px;border-radius:6px;cursor:pointer;font-size:13px;}
  .add-card:hover{background:#dfe1e6;color:#172b4d;}
  .add-col{flex:0 0 280px;background:rgba(255,255,255,.5);border:1px dashed #b9c0cb;border-radius:12px;color:#5e6c84;cursor:pointer;padding:12px;font-size:14px;font-weight:600;}
  .add-col:hover{background:#fff;}

  /* ===== card image ===== */
  .card .cimg{display:block;width:100%;max-height:240px;object-fit:cover;border-bottom:1px solid #eef0f4;cursor:zoom-out;}
  .card .bar .imgbtn{font-size:12px;border:0;background:transparent;cursor:pointer;opacity:0;padding:0 3px;line-height:1;}
  .card:hover .bar .imgbtn{opacity:.65;}
  .card .bar .imgbtn:hover{opacity:1;}

  /* ===== dark mode ===== */
  body.dark{--bg:#15181d;--grid:#21252c;--ink:#e6e9ef;--muted:#7a818c;--panel:#23272e;--line:#3a4049;--accent:#5c9cff;--shadow:0 4px 14px rgba(0,0,0,.5);}
  body.dark .card .body{color:#c3c8d0;}
  body.dark .col{background:#2a2f37;}
  body.dark .col-h button{color:#aab2bd;}
  body.dark .col-h button:hover{background:#3a4049;}
  body.dark .add-card{color:#aab2bd;}
  body.dark .add-card:hover{background:#3a4049;color:#fff;}
  body.dark .add-col{background:rgba(255,255,255,.04);border-color:#3a4049;color:#aab2bd;}
  body.dark .kcard{color:#1a1d23;}
  body.dark .modal{background:#23272e;}
  body.dark .modal h2,body.dark .modal p{color:var(--ink);}
  body.dark .modal label{color:#c3c8d0;}
  body.dark .modal input,body.dark #search{background:#1b1f25;color:var(--ink);border-color:#3a4049;}
  body.dark .btn-g{background:#3a4049;color:#e6e9ef;}
  body.dark .steps{background:#1b1f25;color:#c3c8d0;}
  body.dark pre.sql{background:#10131a;}

  /* ===== todos ===== */
  .card .todos{padding:0 12px 8px;}
  .todo-row{display:flex;align-items:flex-start;gap:6px;font-size:13px;line-height:1.5;padding:1px 0;}
  .todo-row input[type=checkbox]{margin-top:3px;cursor:pointer;flex:0 0 auto;}
  .todo-row .tt{flex:1;outline:none;min-width:0;word-break:break-word;}
  .todo-row .tt:empty:before{content:"待辦項目…";color:var(--muted);}
  .todo-row.done .tt{text-decoration:line-through;color:var(--muted);}
  .todo-row .tdel{opacity:0;border:0;background:transparent;color:#c92a2a;cursor:pointer;font-size:12px;}
  .todo-row:hover .tdel{opacity:.7;}
  .card .bar .tdbtn{font-size:12px;border:0;background:transparent;cursor:pointer;opacity:0;padding:0 3px;line-height:1;}
  .card:hover .bar .tdbtn{opacity:.65;}
  .card .bar .tdbtn:hover{opacity:1;}
  body.dark .todo-row .tt{color:var(--ink);}

  /* ===== kanban card image ===== */
  .kcard .kcimg{display:block;width:100%;max-height:150px;object-fit:cover;border-radius:6px;margin-bottom:5px;cursor:zoom-out;}
  .kcard .kimg{border:0;background:transparent;color:#9aa3b0;cursor:pointer;font-size:12px;border-radius:4px;padding:0 2px;opacity:0;}
  .kcard:hover .kimg{opacity:1;}

  /* ===== print / pdf ===== */
  #printarea{display:none;}
  @media print{
    body *{visibility:hidden;}
    #printarea,#printarea *{visibility:visible;}
    #printarea{display:block;position:absolute;left:0;top:0;width:100%;padding:24px;color:#000;background:#fff;}
    .p-board{font-size:22px;font-weight:700;margin:0 0 16px;}
    .p-card{border:1px solid #ccc;border-radius:8px;padding:10px 12px;margin:0 0 12px;break-inside:avoid;}
    .p-card h3{margin:0 0 4px;font-size:15px;}
    .p-card .pb{font-size:13px;white-space:pre-wrap;color:#222;}
    .p-card img{max-width:100%;max-height:260px;border-radius:6px;margin:6px 0;display:block;}
    .p-todo{font-size:13px;}
    .p-col{margin:0 0 14px;break-inside:avoid;}
    .p-col h2{font-size:16px;border-bottom:2px solid #333;padding-bottom:3px;}
  }

  #bar{position:fixed;top:12px;left:12px;right:12px;display:flex;gap:8px;align-items:center;z-index:30;pointer-events:none;flex-wrap:wrap;}
  #bar>*{pointer-events:auto;}
  .grp{display:flex;gap:4px;background:var(--panel);border-radius:10px;padding:5px;box-shadow:var(--shadow);align-items:center;}
  button.tb{border:0;background:transparent;padding:7px 11px;border-radius:7px;font-size:13px;cursor:pointer;color:var(--ink);white-space:nowrap;}
  button.tb:hover{background:#eef1f6;}
  button.tb.alt{color:var(--accent);font-weight:600;}
  button.tb.kanbtn{color:#0c8599;font-weight:600;}
  #crumbs{display:flex;align-items:center;gap:2px;background:var(--panel);border-radius:10px;padding:6px 10px;box-shadow:var(--shadow);font-size:13px;max-width:42vw;overflow:auto;white-space:nowrap;}
  #crumbs a{color:var(--accent);cursor:pointer;text-decoration:none;}
  #crumbs a:last-child{color:var(--ink);font-weight:600;cursor:default;}
  #crumbs .sepc{color:var(--muted);margin:0 2px;}
  #search{border:0;background:var(--panel);border-radius:10px;padding:9px 12px;box-shadow:var(--shadow);font-size:13px;width:120px;color:var(--ink);}
  #sync-btn{display:flex;align-items:center;gap:6px;}
  #sdot{width:9px;height:9px;border-radius:50%;background:#c4c9d2;}
  #sdot.ok{background:#37b24d;} #sdot.busy{background:#f59f00;} #sdot.err{background:#e8590c;}
  #hint{position:fixed;bottom:12px;left:12px;background:var(--panel);box-shadow:var(--shadow);border-radius:10px;padding:8px 12px;font-size:12px;color:var(--muted);z-index:30;max-width:74vw;}
  #colors{position:fixed;display:none;gap:6px;background:var(--panel);box-shadow:var(--shadow);border-radius:10px;padding:8px;z-index:50;flex-wrap:wrap;max-width:200px;}
  #colors span{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid #fff;box-shadow:0 0 0 1px #ddd;}
  #colors .cdel{width:auto;border-radius:6px;background:#fde7e7;color:#c92a2a;padding:0 8px;font-size:12px;display:flex;align-items:center;box-shadow:none;border:0;}
  #zoom{position:fixed;bottom:12px;right:12px;display:flex;gap:4px;background:var(--panel);box-shadow:var(--shadow);border-radius:10px;padding:5px;z-index:30;}
  .ov{position:fixed;inset:0;background:rgba(20,28,45,.4);display:none;align-items:center;justify-content:center;z-index:60;}
  .ov.show{display:flex;}
  .modal{background:#fff;border-radius:16px;box-shadow:0 12px 40px rgba(0,0,0,.25);width:min(520px,92vw);max-height:88vh;overflow:auto;padding:22px 24px;}
  .modal h2{margin:0 0 4px;font-size:18px;} .modal p{font-size:13px;color:#555;line-height:1.6;}
  .modal label{display:block;font-size:12px;font-weight:600;margin:14px 0 4px;color:#444;}
  .modal input{width:100%;padding:10px 12px;border:1px solid #d6dae1;border-radius:9px;font-size:13px;}
  .modal .row{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;flex-wrap:wrap;}
  .modal button{border:0;border-radius:9px;padding:10px 16px;font-size:13px;cursor:pointer;}
  .btn-p{background:var(--accent);color:#fff;} .btn-g{background:#eef1f6;color:#333;}
  .steps{font-size:12.5px;color:#444;line-height:1.7;background:#f7f9fc;border-radius:10px;padding:12px 14px;margin-top:8px;}
  pre.sql{background:#1f2430;color:#e6edf3;font-size:11.5px;border-radius:9px;padding:12px;overflow:auto;line-height:1.55;}
  input::placeholder{color:var(--muted);}
  #g-input{width:100%;padding:10px 12px;border:1px solid #d6dae1;border-radius:9px;font-size:14px;}
  body.dark #g-input{background:#1b1f25;color:var(--ink);border-color:#3a4049;}
  #g-results{margin-top:12px;max-height:50vh;overflow:auto;display:flex;flex-direction:column;gap:4px;}
  .g-item{text-align:left;border:0;background:transparent;cursor:pointer;padding:8px 10px;border-radius:8px;font-size:13px;color:var(--ink);}
  .g-item:hover{background:#eef1f6;}
  body.dark .g-item:hover{background:#3a4049;}
  .g-item .g-meta{font-size:11px;color:var(--muted);margin-top:2px;}
  .g-empty{color:var(--muted);font-size:13px;padding:8px 4px;}
</style>
</head>
<body>
<div id="stage"><div id="world"><svg id="wires"></svg></div></div>
<div id="kanban"></div>

<div id="bar">
  <div id="crumbs"></div>
  <div class="grp" id="grp-canvas">
    <button class="tb alt" id="add">＋ 卡片</button>
    <button class="tb kanbtn" id="addk">▦ 看板</button>
    <button class="tb" id="fit">⤢ 適配</button>
    <button class="tb" id="tidy" title="自動整齊排列卡片">▥ 整理</button>
  </div>
  <div class="grp" id="grp-kanban" style="display:none">
    <button class="tb" id="backwb">← 白板</button>
    <button class="tb kanbtn" id="addcol">＋ 欄位</button>
  </div>
  <input id="search" placeholder="🔍 搜尋…">
  <div class="grp">
    <button class="tb" id="gsearch" title="全域搜尋（跨所有白板）">🔎</button>
    <button class="tb" id="theme" title="深色／淺色模式">🌙</button>
    <button class="tb" id="pdf" title="匯出目前白板為 PDF">PDF</button>
    <button class="tb" id="exp">匯出</button>
    <button class="tb" id="imp">匯入</button>
    <button class="tb" id="sync-btn"><span id="sdot"></span>帳號</button>
  </div>
</div>

<div id="colors"></div>
<div id="zoom">
  <button class="tb" id="zout">－</button>
  <button class="tb" id="zlvl">100%</button>
  <button class="tb" id="zin">＋</button>
</div>
<div id="hint"></div>

<input type="file" id="file" accept="application/json" style="display:none">
<input type="file" id="imgfile" accept="image/*" style="display:none">
<div id="printarea"></div>

<div class="ov" id="gsmodal">
  <div class="modal">
    <h2>全域搜尋</h2>
    <p style="margin:0 0 6px">搜尋所有白板、子白板與看板的卡片內容（也可用 #標籤 搜尋）。</p>
    <input id="g-input" placeholder="輸入關鍵字或 #標籤…" autocomplete="off">
    <div id="g-results"></div>
    <div class="row"><button class="btn-g" id="g-close">關閉</button></div>
  </div>
</div>

<div class="ov" id="authmodal">
  <div class="modal">
    <div id="auth-in">
      <h2>登入以使用雲端同步</h2>
      <p>用 email 與密碼登入，你的白板只有你看得到。第一次使用請先「註冊」，到信箱點一下確認連結，再回來登入。</p>
      <label>Email</label>
      <input id="a-email" type="email" placeholder="you@example.com" autocomplete="username">
      <label>密碼</label>
      <input id="a-pw" type="password" placeholder="至少 6 個字" autocomplete="current-password">
      <div id="auth-msg" style="font-size:12.5px;color:#c92a2a;margin-top:8px;min-height:16px;line-height:1.5;"></div>
      <div class="row">
        <button class="btn-g" id="a-cancel">先不登入</button>
        <button class="btn-g" id="a-signup">註冊</button>
        <button class="btn-p" id="a-login">登入</button>
      </div>
    </div>
    <div id="auth-out" style="display:none">
      <h2>帳號</h2>
      <p>已登入：<b><span id="acct-email"></span></b><br>你的白板正在雲端同步，其他裝置用同一帳號登入即可看到。</p>
      <div class="row">
        <button class="btn-g" id="a-cancel2">關閉</button>
        <button class="btn-g" id="a-logout">登出</button>
      </div>
    </div>
  </div>
</div>

<script>
"use strict";
const $=s=>document.querySelector(s);
const stage=$("#stage"),world=$("#world"),wires=$("#wires"),kan=$("#kanban");
const PALETTE=["#ffffff","#fff3bf","#ffd8c2","#d3f9d8","#d0ebff","#e5dbff","#ffe3ef","#e9ecef"];
const uid=()=>Math.random().toString(36).slice(2,9);
const HINT_CANVAS="雙擊空白＝新增卡片 · 「▦ 看板」＝切換到本白板的看板 · 卡片右上「開啟」＝進入子白板 · 拖藍點＝連線 · 選取卡片按 Delete 刪除";
const HINT_KANBAN="拖卡片左側 ⠿ 把手＝跨欄移動 · 點欄位/卡片文字可直接編輯 · 卡片「⋯」＝換色或刪除 · 麵包屑可返回白板";

let doc,cur,trail=[],view={x:80,y:120,k:1};
function newBoard(name,type){
  if(type==="kanban")return {name:name||"看板",type:"kanban",columns:[
    {id:uid(),title:"待辦",cards:[]},{id:uid(),title:"進行中",cards:[]},{id:uid(),title:"完成",cards:[]}]};
  return {name:name||"白板",type:"canvas",cards:{},links:[],view:{x:80,y:120,k:1}};
}
function freshDoc(){const rid=uid();const d={v:3,root:rid,boards:{}};d.boards[rid]=newBoard("我的白板","canvas");return d;}
// 把舊版「看板卡片」自動轉成該白板的配對看板，並移除卡片
function migrateKanbanCards(){
  let changed=0;
  for(const bid in doc.boards){const b=doc.boards[bid];if(b.type!=="canvas"||!b.cards)continue;
    for(const cid of Object.keys(b.cards)){const c=b.cards[cid];
      if(c.child&&doc.boards[c.child]&&doc.boards[c.child].type==="kanban"){
        if(!b.kanban)b.kanban=c.child;
        delete b.cards[cid];
        if(b.links)b.links=b.links.filter(l=>l.a!==cid&&l.b!==cid);
        changed++;
      }
    }
  }
  return changed;
}

function loadLocal(){
  try{doc=JSON.parse(localStorage.getItem("wb2_doc"));}catch(e){doc=null;}
  if(!doc||!doc.boards||!doc.root){doc=freshDoc();seed();saveLocal();}
  for(const id in doc.boards){if(!doc.boards[id].type)doc.boards[id].type="canvas";}
  migrateKanbanCards();
  cur=doc.root;trail=[doc.root];
}
const board=()=>doc.boards[cur];
let saveT;
function saveLocal(){clearTimeout(saveT);saveT=setTimeout(()=>{const b=board();if(b&&b.type==="canvas")b.view=view;localStorage.setItem("wb2_doc",JSON.stringify(doc));schedulePush();},250);}

function seed(){
  const b=doc.boards[doc.root];
  const mk=(x,y,t,bd,c,child)=>{const id=uid();b.cards[id]={id,x,y,w:230,title:t,body:bd,color:c,child:child||null};return id;};
  const a=mk(200,250,"歡迎使用進階白板 👋","雙擊空白＝新增卡片。\n卡片右上「開啟」可進入子白板。\n上方「▦ 看板」可切到本白板的看板。","#fff3bf",null);
  const e=mk(560,260,"嵌套白板","點我右上角「開啟」，進去後再加卡片。","#d0ebff",null);
  b.links.push({a,b:e});
}

/* ---------- view (canvas) ---------- */
function applyView(){
  world.style.transform=`translate(${view.x}px,${view.y}px) scale(${view.k})`;
  const sz=40*view.k;stage.style.backgroundSize=`${sz}px ${sz}px`;stage.style.backgroundPosition=`${view.x}px ${view.y}px`;
  $("#zlvl").textContent=Math.round(view.k*100)+"%";saveLocal();
}
const s2w=(sx,sy)=>({x:(sx-view.x)/view.k,y:(sy-view.y)/view.k});

/* ---------- breadcrumb / navigation ---------- */
function renderCrumbs(){
  const c=$("#crumbs");c.innerHTML="";
  trail.forEach((bid,i)=>{
    if(i>0){const s=document.createElement("span");s.className="sepc";s.textContent="›";c.appendChild(s);}
    const a=document.createElement("a");const bd=doc.boards[bid];a.textContent=(bd?(bd.type==="kanban"?"▦ ":"")+bd.name:"?");
    if(i<trail.length-1)a.onclick=()=>gotoDepth(i);
    c.appendChild(a);
  });
}
function gotoDepth(i){trail=trail.slice(0,i+1);cur=trail[i];enterBoard();}
function openChild(card){
  if(!card.child){const id=uid();doc.boards[id]=newBoard(card.title||"子白板","canvas");card.child=id;saveLocal();}
  trail.push(card.child);cur=card.child;enterBoard();
}
function enterBoard(){
  const b=board();
  $("#search").value="";
  cmenu.style.display="none";
  renderCrumbs();
  if(b.type==="kanban"){
    stage.style.display="none";$("#zoom").style.display="none";kan.classList.add("show");
    $("#grp-canvas").style.display="none";$("#grp-kanban").style.display="";
    $("#hint").textContent=HINT_KANBAN;
    renderKanban();
  }else{
    kan.classList.remove("show");stage.style.display="";$("#zoom").style.display="";
    $("#grp-canvas").style.display="";$("#grp-kanban").style.display="none";
    $("#hint").textContent=HINT_CANVAS;
    view=Object.assign({x:80,y:120,k:1},b.view||{});

/* ---------- canvas render ---------- */
function render(){
  [...world.querySelectorAll(".card")].forEach(n=>n.remove());
  const cs=board().cards;for(const id in cs)addCardEl(cs[id]);
  drawWires();
}
function addCardEl(c){
  const el=document.createElement("div");
  el.className="card";el.dataset.id=c.id;
  el.style.left=c.x+"px";el.style.top=c.y+"px";if(c.w)el.style.width=c.w+"px";
  el.style.setProperty("--c",c.color||"#fafbfc");
  el.innerHTML=`<div class="bar"><button class="imgbtn" title="貼圖片">🖼</button><button class="tdbtn" title="加待辦">☑</button><span class="sp"></span><button class="open">↳ 開啟</button></div>
    <img class="cimg" alt="" style="display:none">
    <div class="title" contenteditable="true" spellcheck="false"></div>
    <div class="body" contenteditable="true" spellcheck="false"></div>
    <div class="todos"></div>
    <div class="port l"></div><div class="port r"></div>`;
  el.querySelector(".title").textContent=c.title||"";
  el.querySelector(".body").textContent=c.body||"";
  const cim=el.querySelector(".cimg");if(c.img){cim.src=c.img;cim.style.display="block";}
  renderTodos(el,c);
  const ob=el.querySelector(".open");
  const ct=c.child&&doc.boards[c.child]?doc.boards[c.child].type:null;
  if(ct==="kanban"){ob.classList.add("kan");ob.textContent="▦ 看板 ›";}
  else if(ct==="canvas"){ob.classList.add("has");ob.textContent="↳ 開啟 ›";}
  world.appendChild(el);wireCard(el,c);
}
function renderTodos(el,c){
  const box=el.querySelector(".todos");if(!box)return;box.innerHTML="";
  (c.todos||[]).forEach((t,i)=>{
    const row=document.createElement("div");row.className="todo-row"+(t.done?" done":"");
    const cb=document.createElement("input");cb.type="checkbox";cb.checked=!!t.done;
    cb.addEventListener("change",()=>{t.done=cb.checked;row.classList.toggle("done",cb.checked);saveLocal();});
    const tx=document.createElement("div");tx.className="tt";tx.contentEditable="true";tx.spellcheck=false;tx.textContent=t.text||"";
    tx.addEventListener("input",()=>{t.text=tx.textContent;saveLocal();});
    const del=document.createElement("button");del.className="tdel";del.textContent="✕";
    del.addEventListener("click",e=>{e.stopPropagation();c.todos.splice(i,1);renderTodos(el,c);saveLocal();drawWires();});
    row.append(cb,tx,del);box.appendChild(row);
  });
}
function cardPort(c,side){
  const el=world.querySelector(`.card[data-id="${c.id}"]`);
  const w=c.w||el?.offsetWidth||220,h=el?.offsetHeight||90;
  return {x:c.x+(side==="l"?0:w),y:c.y+h/2};
}
function editLink(lk,i){const t=prompt("這條連線的說明文字（輸入「刪除」可移除連線）：",lk.label||"");if(t===null)return;if(t.trim()==="刪除"){board().links.splice(i,1);}else{lk.label=t;}saveLocal();drawWires();}
function drawWires(){
  wires.innerHTML="";
  const NS="http://www.w3.org/2000/svg";
  (board().links||[]).forEach((lk,i)=>{
    const a=board().cards[lk.a],b=board().cards[lk.b];if(!a||!b)return;
    const p1=cardPort(a,"r"),p2=cardPort(b,"l");const dx=Math.max(40,Math.abs(p2.x-p1.x)/2);
    const path=document.createElementNS(NS,"path");
    path.setAttribute("d",`M${p1.x},${p1.y} C${p1.x+dx},${p1.y} ${p2.x-dx},${p2.y} ${p2.x},${p2.y}`);
    path.style.pointerEvents="stroke";
    path.addEventListener("click",e=>{e.stopPropagation();editLink(lk,i);});
    wires.appendChild(path);
    if(lk.label){const mx=(p1.x+p2.x)/2,my=(p1.y+p2.y)/2;const tx=document.createElementNS(NS,"text");tx.setAttribute("x",mx);tx.setAttribute("y",my);tx.setAttribute("text-anchor","middle");tx.setAttribute("dy","0.35em");tx.setAttribute("class","wlabel");tx.style.pointerEvents="all";tx.textContent=lk.label;tx.addEventListener("click",e=>{e.stopPropagation();editLink(lk,i);});wires.appendChild(tx);}
  });
}

let sel=null;
function select(el){document.querySelectorAll(".card.sel").forEach(n=>n.classList.remove("sel"));sel=el;if(el)el.classList.add("sel");}
function wireCard(el,c){
  const bar=el.querySelector(".bar"),title=el.querySelector(".title"),body=el.querySelector(".body");
  title.addEventListener("input",()=>{c.title=title.textContent;saveLocal();});
  body.addEventListener("input",()=>{c.body=body.textContent;saveLocal();drawWires();});
  body.addEventListener("blur",()=>{saveLocal();drawWires();});
  el.querySelector(".open").addEventListener("click",e=>{e.stopPropagation();openChild(c);});
  el.querySelector(".imgbtn").addEventListener("click",e=>{e.stopPropagation();pickImage(data=>{c.img=data;const im=el.querySelector(".cimg");im.src=data;im.style.display="block";saveLocal();drawWires();});});
  el.querySelector(".tdbtn").addEventListener("click",e=>{e.stopPropagation();if(!c.todos)c.todos=[];c.todos.push({text:"",done:false});renderTodos(el,c);drawWires();saveLocal();setTimeout(()=>{const rows=el.querySelectorAll(".todo-row .tt");if(rows.length)rows[rows.length-1].focus();},0);});
  el.querySelector(".cimg").addEventListener("click",e=>{e.stopPropagation();if(confirm("移除這張圖片？")){c.img=null;const im=el.querySelector(".cimg");im.removeAttribute("src");im.style.display="none";saveLocal();drawWires();}});
  let dr=false,sx,sy,ox,oy;
  bar.addEventListener("pointerdown",e=>{if(e.target.classList.contains("open"))return;e.stopPropagation();select(el);dr=true;bar.setPointerCapture(e.pointerId);sx=e.clientX;sy=e.clientY;ox=c.x;oy=c.y;});
  bar.addEventListener("pointermove",e=>{if(!dr)return;c.x=ox+(e.clientX-sx)/view.k;c.y=oy+(e.clientY-sy)/view.k;el.style.left=c.x+"px";el.style.top=c.y+"px";drawWires();});
  bar.addEventListener("pointerup",()=>{dr=false;saveLocal();});
  el.addEventListener("pointerdown",e=>{if(e.target.classList.contains("port"))return;select(el);});
  el.addEventListener("contextmenu",e=>{e.preventDefault();openColors(e.clientX,e.clientY,col=>{c.color=col;el.style.setProperty("--c",col);saveLocal();},()=>{deleteCard(c.id);});});
  el.querySelectorAll(".port").forEach(p=>p.addEventListener("pointerdown",e=>{e.stopPropagation();e.preventDefault();startLink(c);}));
}
let tempLine=null;
function startLink(from){
  const move=ev=>{const w=s2w(ev.clientX,ev.clientY),p1=cardPort(from,"r");
    if(!tempLine){tempLine=document.createElementNS("http://www.w3.org/2000/svg","path");tempLine.setAttribute("stroke","#4c8bf5");tempLine.setAttribute("stroke-dasharray","5 4");wires.appendChild(tempLine);}
    const dx=Math.max(40,Math.abs(w.x-p1.x)/2);
    tempLine.setAttribute("d",`M${p1.x},${p1.y} C${p1.x+dx},${p1.y} ${w.x-dx},${w.y} ${w.x},${w.y}`);};
  const up=ev=>{document.removeEventListener("pointermove",move);document.removeEventListener("pointerup",up);
    if(tempLine){tempLine.remove();tempLine=null;}
    const tgt=document.elementFromPoint(ev.clientX,ev.clientY)?.closest(".card");
    if(tgt&&tgt.dataset.id!==from.id){const b=tgt.dataset.id;
      if(!board().links.some(l=>(l.a===from.id&&l.b===b)||(l.a===b&&l.b===from.id))){board().links.push({a:from.id,b});saveLocal();drawWires();}}};
  document.addEventListener("pointermove",move);document.addEventListener("pointerup",up);
}
function newCard(wx,wy,opts={}){
  const c={id:uid(),x:wx-90,y:wy-30,w:230,title:"",body:"",color:"#ffffff",child:null,...opts};
  board().cards[c.id]=c;addCardEl(c);saveLocal();
  setTimeout(()=>world.querySelector(`.card[data-id="${c.id}"] .title`)?.focus(),0);return c;
}
function deleteCard(id){const c=board().cards[id];
  if(c&&c.child&&!confirm("此卡片含有子層（白板或看板），一併刪除？"))return;
  if(c&&c.child)delete doc.boards[c.child];
  delete board().cards[id];board().links=board().links.filter(l=>l.a!==id&&l.b!==id);
  world.querySelector(`.card[data-id="${id}"]`)?.remove();saveLocal();drawWires();}
function openPairedKanban(){
  const b=board();
  if(!b.kanban||!doc.boards[b.kanban]){const id=uid();doc.boards[id]=newBoard(b.name||"看板","kanban");b.kanban=id;saveLocal();}
  trail.push(b.kanban);cur=b.kanban;enterBoard();
}

/* ================= KANBAN ================= */
function renderKanban(){
  kan.innerHTML="";
  const b=board();
  b.columns.forEach((col,ci)=>{
    const cEl=document.createElement("div");cEl.className="col";cEl.dataset.ci=ci;
    cEl.innerHTML=`<div class="col-h">
        <button class="cmoveL" title="左移">◀</button>
        <div class="ctitle" contenteditable="true" spellcheck="false"></div>
        <button class="cmoveR" title="右移">▶</button>
        <button class="cdelcol" title="刪除欄位">✕</button>
      </div>
      <div class="col-cards"></div>
      <button class="add-card">＋ 新增卡片</button>`;
    cEl.querySelector(".ctitle").textContent=col.title;
    cEl.querySelector(".ctitle").addEventListener("input",ev=>{col.title=ev.target.textContent;saveLocal();});
    cEl.querySelector(".cmoveL").onclick=()=>{if(ci>0){b.columns.splice(ci-1,0,b.columns.splice(ci,1)[0]);saveLocal();renderKanban();}};
    cEl.querySelector(".cmoveR").onclick=()=>{if(ci<b.columns.length-1){b.columns.splice(ci+1,0,b.columns.splice(ci,1)[0]);saveLocal();renderKanban();}};
    cEl.querySelector(".cdelcol").onclick=()=>{if(col.cards.length&&!confirm("此欄位有卡片，確定刪除整欄？"))return;b.columns.splice(ci,1);saveLocal();renderKanban();};
    const wrap=cEl.querySelector(".col-cards");
    col.cards.forEach(kc=>wrap.appendChild(buildKCard(kc,ci)));
    cEl.querySelector(".add-card").onclick=()=>{const nc={id:uid(),title:"",color:"#ffffff"};col.cards.push(nc);saveLocal();renderKanban();
      setTimeout(()=>kan.querySelector(`.kcard[data-id="${nc.id}"] .ktitle`)?.focus(),0);};
    kan.appendChild(cEl);
  });
  const addc=document.createElement("button");addc.className="add-col";addc.textContent="＋ 新增欄位";
  addc.onclick=()=>{b.columns.push({id:uid(),title:"新欄位",cards:[]});saveLocal();renderKanban();};
  kan.appendChild(addc);
  applySearchFilter();
}
function buildKCard(kc,ci){
  const el=document.createElement("div");el.className="kcard";el.dataset.id=kc.id;el.dataset.ci=ci;
  el.style.setProperty("--kc",kc.color||"#fff");
  el.innerHTML=`<span class="kh" title="拖曳移動">⠿</span><div class="kbody"><img class="kcimg" alt="" style="display:none"><div class="ktitle" contenteditable="true" spellcheck="false"></div></div><button class="kimg" title="貼圖片">🖼</button><button class="kmore" title="更多">⋯</button>`;
  const t=el.querySelector(".ktitle");t.textContent=kc.title||"";
  t.addEventListener("input",()=>{kc.title=t.textContent;saveLocal();});
  const ki=el.querySelector(".kcimg");if(kc.img){ki.src=kc.img;ki.style.display="block";}
  ki.addEventListener("click",e=>{e.stopPropagation();if(confirm("移除這張圖片？")){kc.img=null;saveLocal();renderKanban();}});
  el.querySelector(".kimg").onclick=e=>{e.stopPropagation();pickImage(data=>{kc.img=data;saveLocal();renderKanban();});};
  el.querySelector(".kmore").onclick=e=>{e.stopPropagation();const r=e.target.getBoundingClientRect();
    openColors(r.left-150,r.bottom+4,col=>{kc.color=col;el.style.setProperty("--kc",col);saveLocal();},()=>{deleteKCard(ci,kc.id);});};
  el.querySelector(".kh").addEventListener("pointerdown",ev=>startKDrag(ev,el,ci,kc));
  return el;
}
function deleteKCard(ci,id){const col=board().columns[ci];if(!col)return;col.cards=col.cards.filter(c=>c.id!==id);saveLocal();renderKanban();}

/* ----- kanban drag ----- */
let kd=null;
function startKDrag(e,el,ci,kc){
  e.preventDefault();e.stopPropagation();
  const rect=el.getBoundingClientRect();
  const ph=document.createElement("div");ph.className="kph";ph.style.height=rect.height+"px";
  el.parentNode.insertBefore(ph,el.nextSibling);
  el.classList.add("dragging");el.style.width=rect.width+"px";
  kd={el,ph,srcCi:ci,card:kc,ox:e.clientX-rect.left,oy:e.clientY-rect.top};
  moveKDrag(e);
  window.addEventListener("pointermove",moveKDrag);
  window.addEventListener("pointerup",endKDrag);
}
function moveKDrag(e){
  if(!kd)return;
  kd.el.style.left=(e.clientX-kd.ox)+"px";kd.el.style.top=(e.clientY-kd.oy)+"px";
  let colEl=null;
  for(const c of document.querySelectorAll(".col")){const r=c.getBoundingClientRect();if(e.clientX>=r.left&&e.clientX<=r.right){colEl=c;break;}}
  if(!colEl)return;
  const wrap=colEl.querySelector(".col-cards");
  const cards=[...wrap.querySelectorAll(".kcard:not(.dragging)")];
  let before=null;
  for(const c of cards){const r=c.getBoundingClientRect();if(e.clientY<r.top+r.height/2){before=c;break;}}
  if(before)wrap.insertBefore(kd.ph,before);else wrap.appendChild(kd.ph);
}
function endKDrag(){
  window.removeEventListener("pointermove",moveKDrag);window.removeEventListener("pointerup",endKDrag);
  if(!kd)return;
  const colEl=kd.ph.closest(".col");const b=board();
  const src=b.columns[kd.srcCi];const idx=src.cards.findIndex(c=>c.id===kd.card.id);if(idx>=0)src.cards.splice(idx,1);
  const tci=+colEl.dataset.ci;const wrap=colEl.querySelector(".col-cards");
  let insert=0,count=0,found=false;
  for(const n of wrap.children){if(n===kd.ph){insert=count;found=true;break;}if(n.classList.contains("kcard")&&!n.classList.contains("dragging"))count++;}
  if(!found)insert=count;
  b.columns[tci].cards.splice(insert,0,kd.card);
  kd.el.classList.remove("dragging");kd.el.removeAttribute("style");kd.ph.remove();
  kd=null;saveLocal();renderKanban();
}

/* ---------- pan & zoom (canvas) ---------- */
let panning=false,psx,psy,pvx,pvy;
stage.addEventListener("pointerdown",e=>{if(e.target!==stage&&e.target!==world&&e.target!==wires)return;panning=true;stage.classList.add("panning");psx=e.clientX;psy=e.clientY;pvx=view.x;pvy=view.y;select(null);cmenu.style.display="none";});
window.addEventListener("pointermove",e=>{if(!panning)return;view.x=pvx+(e.clientX-psx);view.y=pvy+(e.clientY-psy);applyView();});
window.addEventListener("pointerup",()=>{panning=false;stage.classList.remove("panning");});
stage.addEventListener("dblclick",e=>{if(e.target!==stage&&e.target!==world&&e.target!==wires)return;const w=s2w(e.clientX,e.clientY);newCard(w.x,w.y);});
stage.addEventListener("wheel",e=>{e.preventDefault();zoomAt(e.clientX,e.clientY,e.deltaY<0?1.1:0.9);},{passive:false});
function zoomAt(cx,cy,f){const k2=Math.min(2.5,Math.max(0.2,view.k*f)),w=s2w(cx,cy);view.k=k2;view.x=cx-w.x*k2;view.y=cy-w.y*k2;applyView();}
$("#zin").onclick=()=>zoomAt(innerWidth/2,innerHeight/2,1.15);
$("#zout").onclick=()=>zoomAt(innerWidth/2,innerHeight/2,0.87);
$("#zlvl").onclick=()=>{view.k=1;applyView();};
let pinch=null;
stage.addEventListener("touchstart",e=>{if(e.touches.length===2){const[a,b]=e.touches;pinch={d:Math.hypot(a.clientX-b.clientX,a.clientY-b.clientY),cx:(a.clientX+b.clientX)/2,cy:(a.clientY+b.clientY)/2};}},{passive:false});
stage.addEventListener("touchmove",e=>{if(pinch&&e.touches.length===2){e.preventDefault();const[a,b]=e.touches,d=Math.hypot(a.clientX-b.clientX,a.clientY-b.clientY);zoomAt(pinch.cx,pinch.cy,d/pinch.d);pinch.d=d;}},{passive:false});
stage.addEventListener("touchend",()=>{pinch=null;});
window.addEventListener("keydown",e=>{if((e.key==="Delete"||e.key==="Backspace")&&sel&&board().type==="canvas"&&document.activeElement.tagName!=="INPUT"&&!document.activeElement.isContentEditable){e.preventDefault();deleteCard(sel.dataset.id);select(null);}});

function fit(){const ids=Object.keys(board().cards);if(!ids.length){view={x:innerWidth/2-110,y:innerHeight/2-60,k:1};applyView();return;}
  let mnx=1e9,mny=1e9,mxx=-1e9,mxy=-1e9;
  ids.forEach(id=>{const c=board().cards[id],el=world.querySelector(`.card[data-id="${id}"]`),w=el?.offsetWidth||230,h=el?.offsetHeight||100;mnx=Math.min(mnx,c.x);mny=Math.min(mny,c.y);mxx=Math.max(mxx,c.x+w);mxy=Math.max(mxy,c.y+h);});
  const pad=80,bw=mxx-mnx+pad*2,bh=mxy-mny+pad*2,k=Math.min(2,Math.min(innerWidth/bw,innerHeight/bh));
  view.k=k;view.x=(innerWidth-(mxx+mnx)*k)/2;view.y=(innerHeight-(mxy+mny)*k)/2;applyView();}
$("#fit").onclick=fit;
$("#add").onclick=()=>{const w=s2w(innerWidth/2,innerHeight/2);newCard(w.x,w.y);};
$("#addk").onclick=openPairedKanban;
$("#backwb").onclick=()=>{if(trail.length>1){trail.pop();cur=trail[trail.length-1];enterBoard();}};
$("#addcol").onclick=()=>{board().columns.push({id:uid(),title:"新欄位",cards:[]});saveLocal();renderKanban();};

/* ---------- tidy（一鍵整理排版） ---------- */
function tidy(){
  const ids=Object.keys(board().cards);if(!ids.length)return;
  ids.sort((x,y)=>{const a=board().cards[x],b=board().cards[y];return (a.y-b.y)||(a.x-b.x);});
  const cols=Math.max(1,Math.round(Math.sqrt(ids.length*1.3)));
  const gx=270,gy=210,sx=80,sy=80;
  ids.forEach((id,i)=>{const c=board().cards[id];c.x=sx+(i%cols)*gx;c.y=sy+Math.floor(i/cols)*gy;});
  saveLocal();render();setTimeout(fit,30);
}
$("#tidy").onclick=tidy;

/* ---------- global search（全域搜尋） ---------- */
function boardParentMap(){const p={};for(const id in doc.boards){const b=doc.boards[id];if(b.type!=="canvas")continue;if(b.cards)for(const cid in b.cards){const c=b.cards[cid];if(c.child)p[c.child]=id;}if(b.kanban)p[b.kanban]=id;}return p;}
function boardPath(target){const p=boardParentMap();const path=[target];let cur2=target,g=0;while(p[cur2]&&g++<200){cur2=p[cur2];path.unshift(cur2);}return path;}
function gotoBoard(target){const path=boardPath(target);trail=path.length?path:[doc.root];cur=trail[trail.length-1];enterBoard();}
function globalSearch(q){
  q=q.trim().toLowerCase();const out=[];if(!q)return out;
  for(const id in doc.boards){const b=doc.boards[id];
    if(b.type==="canvas"){for(const cid in b.cards){const c=b.cards[cid];const txt=((c.title||"")+" "+(c.body||"")+" "+((c.todos||[]).map(t=>t.text).join(" "))).toLowerCase();if(txt.includes(q))out.push({board:id,bn:b.name,kind:"白板",title:c.title||"（無標題）"});}}
    else if(b.type==="kanban"){for(const col of (b.columns||[]))for(const kc of (col.cards||[])){if((kc.title||"").toLowerCase().includes(q))out.push({board:id,bn:b.name,kind:"看板",title:kc.title||"（無標題）",col:col.title});}}
  }
  return out.slice(0,60);
}
const gsmodal=$("#gsmodal");
function runGlobalSearch(){
  const q=$("#g-input").value;const box=$("#g-results");box.innerHTML="";
  if(!q.trim()){box.innerHTML='<div class="g-empty">輸入關鍵字開始搜尋…</div>';return;}
  const res=globalSearch(q);
  if(!res.length){box.innerHTML='<div class="g-empty">找不到符合的卡片。</div>';return;}
  res.forEach(r=>{const it=document.createElement("button");it.className="g-item";
    const t=document.createElement("div");t.textContent=r.title;const m=document.createElement("div");m.className="g-meta";m.textContent=r.kind+"："+(r.bn||"")+(r.col?(" › "+r.col):"");it.append(t,m);

/* ---------- search ---------- */
function applySearchFilter(){
  const q=$("#search").value.trim().toLowerCase();
  if(board().type==="kanban"){
    document.querySelectorAll(".kcard").forEach(el=>{const ci=+el.dataset.ci;const kc=(board().columns[ci]?.cards||[]).find(c=>c.id===el.dataset.id);el.classList.toggle("dim",!!q&&kc&&!(kc.title||"").toLowerCase().includes(q));});
  }else{
    document.querySelectorAll(".card").forEach(el=>{if(!q){el.classList.remove("dim");return;}const c=board().cards[el.dataset.id];el.classList.toggle("dim",!((c.title||"")+" "+(c.body||"")).toLowerCase().includes(q));});
  }
}
$("#search").addEventListener("input",applySearchFilter);

/* ---------- export / import ---------- */
$("#exp").onclick=()=>{const blob=new Blob([JSON.stringify(doc,null,2)],{type:"application/json"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="白板筆記_備份_"+new Date().toISOString().slice(0,10)+".json";a.click();};
$("#imp").onclick=()=>$("#file").click();
$("#file").addEventListener("change",e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();
  r.onload=()=>{try{const d=JSON.parse(r.result);if(!d.boards||!d.root)throw 0;if(!confirm("匯入會取代目前所有白板，確定？"))return;doc=d;cur=doc.root;trail=[doc.root];localStorage.setItem("wb2_doc",JSON.stringify(doc));enterBoard();schedulePush();}catch(err){alert("檔案格式不正確。");}};
  r.readAsText(f);e.target.value="";});

/* ---------- card image + theme ---------- */
let imgApply=null;
function pickImage(fn){imgApply=fn;$("#imgfile").click();}
function compressImage(file,maxDim,q){return new Promise(res=>{const img=new Image();img.onload=()=>{let w=img.width,h=img.height;const s=Math.min(1,maxDim/Math.max(w,h));w=Math.round(w*s);h=Math.round(h*s);const cv=document.createElement("canvas");cv.width=w;cv.height=h;cv.getContext("2d").drawImage(img,0,0,w,h);const out=cv.toDataURL("image/jpeg",q);URL.revokeObjectURL(img.src);res(out);};img.onerror=()=>res(null);img.src=URL.createObjectURL(file);});}
$("#imgfile").addEventListener("change",async e=>{const f=e.target.files[0];e.target.value="";if(!f||!imgApply)return;const data=await compressImage(f,900,0.72);if(!data){alert("圖片讀取失敗。");return;}imgApply(data);imgApply=null;});
function applyTheme(){const dark=localStorage.getItem("wb2_theme")==="dark";document.body.classList.toggle("dark",dark);$("#theme").textContent=dark?"☀️":"🌙";}
$("#theme").onclick=()=>{const dark=!document.body.classList.contains("dark");localStorage.setItem("wb2_theme",dark?"dark":"light");applyTheme();};

/* ---------- export PDF (列印目前白板) ---------- */
$("#pdf").onclick=()=>{
  const pa=$("#printarea");pa.innerHTML="";const b=board();
  const head=document.createElement("div");head.className="p-board";head.textContent=(b.type==="kanban"?"▦ ":"")+(b.name||"白板");pa.appendChild(head);
  if(b.type==="kanban"){
    b.columns.forEach(col=>{
      const cs=document.createElement("div");cs.className="p-col";
      const ch=document.createElement("h2");ch.textContent=col.title||"";cs.appendChild(ch);
      (col.cards||[]).forEach(kc=>{
        const cc=document.createElement("div");cc.className="p-card";
        if(kc.img){const im=document.createElement("img");im.src=kc.img;cc.appendChild(im);}
        const t=document.createElement("div");t.className="pb";t.textContent=kc.title||"";cc.appendChild(t);
        cs.appendChild(cc);
      });
      pa.appendChild(cs);
    });
  }else{
    Object.values(b.cards).forEach(c=>{
      const cc=document.createElement("div");cc.className="p-card";

      if(c.body){const bd=document.createElement("div");bd.className="pb";bd.textContent=c.body;cc.appendChild(bd);}

let sb=null,user=null;

let localStamp=+localStorage.getItem("wb2_stamp")||0,pollTimer=null,pushT;
function setDot(cls){const d=$("#sdot");d.className="";if(cls)d.classList.add(cls);}

async function pullCloud(){
  if(!sb||!user)return;
  try{
    const {data,error}=await sb.from("whiteboard").select("*").eq("id",user.id).maybeSingle();
    if(error)throw error;
    if(data){
      if(data.updated_at>localStamp && data.by!==clientId){
        if(kd)return "skip";
        if(document.activeElement&&document.activeElement.isContentEditable)return "skip";
        const pc=cur,pt=trail.slice();
        doc=data.data;for(const id in doc.boards){if(!doc.boards[id].type)doc.boards[id].type="canvas";}
        const mc=migrateKanbanCards();
        const keep=doc.boards[pc]?pc:doc.root;
        trail=pt.filter(id=>doc.boards[id]);
        if(!trail.length||trail[trail.length-1]!==keep){trail=[doc.root];if(keep!==doc.root)trail.push(keep);}
        cur=keep;
        localStamp=data.updated_at;localStorage.setItem("wb2_stamp",localStamp);
        localStorage.setItem("wb2_doc",JSON.stringify(doc));enterBoard();
        if(mc)schedulePush();
      }else if(data.updated_at>localStamp){localStamp=data.updated_at;localStorage.setItem("wb2_stamp",localStamp);}
      setDot("ok");return "pulled";
    }else{await pushCloud();return "empty";}
  }catch(e){setDot("err");return "err";}
}
function schedulePush(){if(!sb||!user)return;setDot("busy");clearTimeout(pushT);pushT=setTimeout(pushCloud,800);}
async function pushCloud(){
  if(!sb||!user)return;
  try{
    const stamp=Date.now();
    const {error}=await sb.from("whiteboard").upsert({id:user.id,owner:user.id,data:doc,updated_at:stamp,by:clientId});
    if(error)throw error;
    localStamp=stamp;localStorage.setItem("wb2_stamp",localStamp);setDot("ok");
  }catch(e){setDot("err");}
}
function startSync(){if(pollTimer)clearInterval(pollTimer);if(!sb||!user)return;pullCloud();pollTimer=setInterval(pullCloud,4000);}
function stopSync(){if(pollTimer)clearInterval(pollTimer);pollTimer=null;}

/* ---- auth ---- */
const authmodal=$("#authmodal");
function onSession(session){
  user=session&&session.user?session.user:null;
  if(user){
    $("#auth-in").style.display="none";$("#auth-out").style.display="";
    $("#acct-email").textContent=user.email||"";
    setDot("busy");startSync();authmodal.classList.remove("show");
  }else{
    $("#auth-in").style.display="";$("#auth-out").style.display="none";
    stopSync();setDot("");
  }
}
function initAuth(){
  if(!window.supabase){$("#auth-msg").textContent="無法載入登入元件，請檢查網路後重新整理。";setDot("err");authmodal.classList.add("show");return;}
  sb=supabase.createClient(SB_URL,SB_ANON);
  sb.auth.onAuthStateChange((_e,session)=>onSession(session));
  sb.auth.getSession().then(({data})=>{onSession(data.session);if(!data.session)authmodal.classList.add("show");});
}
$("#sync-btn").onclick=()=>authmodal.classList.add("show");

async function doAuth(mode){
  const email=$("#a-email").value.trim(),pw=$("#a-pw").value,msg=$("#auth-msg");
  msg.style.color="#c92a2a";msg.textContent="";
  if(!email||!pw){msg.textContent="請輸入信箱與密碼。";return;}
  if(!sb){msg.textContent="登入元件尚未就緒，請稍候或重新整理。";return;}
  try{
    if(mode==="signup"){
      const {data,error}=await sb.auth.signUp({email,password:pw});
      if(error)throw error;
      if(!data.session){msg.style.color="#2b8a3e";msg.textContent="註冊成功！請到信箱點擊確認連結，再回來按「登入」。";}
    }else{
      const {error}=await sb.auth.signInWithPassword({email,password:pw});
      if(error)throw error;
    }
  }catch(e){msg.textContent="失敗："+(e.message||e);}
}
$("#a-login").onclick=()=>doAuth("login");
$("#a-signup").onclick=()=>doAuth("signup");
$("#a-logout").onclick=async()=>{if(sb)await sb.auth.signOut();authmodal.classList.remove("show");};
